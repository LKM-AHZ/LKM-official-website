site:
  name: 理科迷
  site: 'https://lkm-official-website.vercel.app'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: 理科迷
    template: '%s — LKM'
  description: 'LKM 官方网站 — 基于 Astro v6 + Tailwind CSS v4 + CSS Modules 构建，支持 Vue / React / Svelte。适用于企业官网、产品展示、博客等场景。'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: LKM
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@lkm'
    site: '@lkm'
    cardType: summary_large_image

i18n:
  language: zh-cn
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
